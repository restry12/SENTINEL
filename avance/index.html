<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avance — Hackathon</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d0d; color: #e0e0e0; font-family: 'Segoe UI', system-ui, sans-serif; padding: 24px; }
  h1 { font-size: 1.4rem; color: #fff; margin-bottom: 4px; }
  .subtitle { font-size: 0.8rem; color: #555; margin-bottom: 28px; }
  .phases { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: 20px; }
  .phase { position: relative; background: #161616; border: 1px solid #222; border-radius: 10px; padding: 18px; }
  .phase-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .phase-title { font-size: 0.9rem; font-weight: 600; color: #fff; }
  .phase-time { font-size: 0.7rem; color: #555; }
  .progress-bar { height: 4px; background: #222; border-radius: 2px; margin-bottom: 6px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
  .phase-pct-label { font-size: 0.7rem; color: #555; margin-bottom: 12px; }
  .tracks { display: flex; flex-direction: column; gap: 12px; }
  .track-block { background: #111; border-radius: 6px; padding: 10px 12px; }
  .track-title { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .track-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .t1 .track-dot { background: #f97316; }
  .t2 .track-dot { background: #3b82f6; }
  .t3 .track-dot { background: #a855f7; }
  .t4 .track-dot { background: #22c55e; }
  .track-name { font-size: 0.75rem; color: #888; font-weight: 600; }
  .track-pct { font-size: 0.7rem; color: #555; margin-left: auto; }

  /* Custom checkbox */
  .task { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; border-bottom: 1px solid #1a1a1a; cursor: pointer; user-select: none; }
  .task:last-child { border-bottom: none; }
  .task input[type=checkbox] { display: none; }
  .checkmark {
    flex-shrink: 0;
    width: 16px; height: 16px;
    border: 1.5px solid #333;
    border-radius: 4px;
    margin-top: 2px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s;
    background: transparent;
  }
  .checkmark svg { display: none; width: 10px; height: 10px; }
  .task.done .checkmark {
    background: #22c55e;
    border-color: #22c55e;
  }
  .task.done .checkmark svg { display: block; }
  .task-label { font-size: 0.78rem; color: #aaa; line-height: 1.45; transition: color 0.15s; }
  .task.done .task-label { color: #3a3a3a; text-decoration: line-through; }

  /* Global bar */
  .global-bar { background: #161616; border: 1px solid #222; border-radius: 10px; padding: 18px; margin-bottom: 20px; }
  .global-bar h2 { font-size: 0.85rem; color: #fff; margin-bottom: 12px; }
  .global-row { display: flex; align-items: center; gap: 16px; }
  .global-pct { font-size: 2.2rem; font-weight: 700; color: #fff; min-width: 68px; }
  .global-progress { flex: 1; height: 8px; background: #222; border-radius: 4px; overflow: hidden; }
  .global-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #f97316, #a855f7); transition: width 0.4s ease; }
  .global-label { font-size: 0.75rem; color: #555; margin-top: 6px; }

  /* Frozen */
  .phase-frozen { opacity: 0.45; pointer-events: none; }
  .frozen-badge { position: absolute; top: 14px; right: 14px; font-size: 0.6rem; color: #f97316; border: 1px solid #f97316; padding: 1px 6px; border-radius: 3px; letter-spacing: 0.08em; }

  /* Track color bars */
  .t1 .progress-fill { background: #f97316; }
  .t2 .progress-fill { background: #3b82f6; }
  .t3 .progress-fill { background: #a855f7; }
  .t4 .progress-fill { background: #22c55e; }

  .save-hint { font-size: 0.7rem; color: #2a2a2a; text-align: center; margin-top: 20px; }
</style>
</head>
<body>

<h1>Hackathon — Dashboard de Avance</h1>
<p class="subtitle">Marca tareas completadas. Se guarda automáticamente en tu navegador.</p>

<div class="global-bar">
  <h2>Progreso total</h2>
  <div class="global-row">
    <div class="global-pct" id="global-pct">0%</div>
    <div style="flex:1">
      <div class="global-progress"><div class="global-fill" id="global-fill" style="width:0%"></div></div>
      <div class="global-label" id="global-label">0 de 0 tareas completadas</div>
    </div>
  </div>
</div>

<div class="phases" id="phases-container"></div>
<p class="save-hint">localStorage — sin servidor, sin cuenta</p>

<script>

  },
  {

    tracks: [

      { id: "f4p2", name: "P2 — Backend", color: "t2", tasks: [

      { id: "f4p3", name: "P3 — Agentes IA", color: "t3", tasks: [

      ]},
      { id: "f4p4", name: "P4 — Pitch / Automatización", color: "t4", tasks: [
        "Terminar presentación en Faces.app con capturas reales del dashboard",
        "Grabar video demo con Monologue (entregable obligatorio)",
        "Subir presentación Faces.app antes de las 20:00 del domingo",
        "Subir video demo antes de las 20:00 del domingo",
        "Confirmar orden de presentación con todo el equipo",
        "Ensayo final completo el domingo en la mañana"
      ]}
    ]
  }
];

// ─── SUPABASE ─────────────────────────────────────────────────────────────────
const SUPA_URL = "https://sjaufigbsiafyzyaaomq.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNqYXVmaWdic2lhZnl6eWFhb21xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxODc2OTAsImV4cCI6MjA5MDc2MzY5MH0.EJBK4Yjnoi8kL-2wtLBCXodYY6L2eSdE6yawTnygNso";
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

// Estado local (cache)
const state = {};

const taskKey = (p, t, i) => `hack_${p}_${t}_${i}`;
const load = (p, t, i) => !!state[taskKey(p, t, i)];
const save = async (p, t, i, v) => {
  const k = taskKey(p, t, i);
  state[k] = v;
  await sb.from("hackathon_tasks").upsert({ task_key: k, done: v, updated_at: new Date().toISOString() });
};

async function loadAllFromDB() {
  const { data } = await sb.from("hackathon_tasks").select("task_key, done");
  if (data) data.forEach(r => { state[r.task_key] = r.done; });
}

// ─── ICONS ───────────────────────────────────────────────────────────────────
const CHECK_SVG = `<svg viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M1.5 5L4 7.5L8.5 2.5" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>`;

// ─── UPDATES ─────────────────────────────────────────────────────────────────
function updateGlobal() {
  let total = 0, done = 0;
  data.forEach(ph => ph.tracks.forEach(tr => tr.tasks.forEach((_, i) => {
    total++; if (load(ph.id, tr.id, i)) done++;
  })));
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById("global-pct").textContent = pct + "%";
  document.getElementById("global-fill").style.width = pct + "%";
  document.getElementById("global-label").textContent = `${done} de ${total} tareas completadas`;
}

function updateTrack(phaseId, trackId) {
  const tr = data.find(p => p.id === phaseId)?.tracks.find(t => t.id === trackId);
  if (!tr) return;
  const done = tr.tasks.filter((_, i) => load(phaseId, trackId, i)).length;
  const pct = Math.round((done / tr.tasks.length) * 100);
  const el = document.getElementById(`tpct-${trackId}`);
  if (el) el.textContent = pct + "%";
  const bar = document.getElementById(`tbar-${trackId}`);
  if (bar) bar.style.width = pct + "%";
}

function updatePhase(phaseId) {
  const ph = data.find(p => p.id === phaseId);
  if (!ph) return;
  let total = 0, done = 0;
  ph.tracks.forEach(tr => tr.tasks.forEach((_, i) => {
    total++; if (load(phaseId, tr.id, i)) done++;
  }));
  const pct = total ? Math.round((done / total) * 100) : 0;
  const bar = document.getElementById(`pbar-${phaseId}`);
  const lbl = document.getElementById(`ppct-${phaseId}`);
  if (bar) bar.style.width = pct + "%";
  if (lbl) lbl.textContent = pct + "%";
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  const container = document.getElementById("phases-container");

  data.forEach(phase => {
    let phTotal = 0, phDone = 0;
    phase.tracks.forEach(t => t.tasks.forEach((_, i) => {
      phTotal++; if (load(phase.id, t.id, i)) phDone++;
    }));
    const phPct = phTotal ? Math.round((phDone / phTotal) * 100) : 0;

    const phaseEl = document.createElement("div");
    phaseEl.className = "phase" + (phase.frozen ? " phase-frozen" : "");

    const tracksHTML = phase.tracks.map(track => {
      const tDone = track.tasks.filter((_, i) => load(phase.id, track.id, i)).length;
      const tPct = Math.round((tDone / track.tasks.length) * 100);

      const tasksHTML = track.tasks.map((task, i) => {
        const checked = load(phase.id, track.id, i);
        return `<label class="task ${checked ? 'done' : ''}">
          <input type="checkbox" ${checked ? "checked" : ""}
            data-phase="${phase.id}" data-track="${track.id}" data-idx="${i}" />
          <span class="checkmark">${CHECK_SVG}</span>
          <span class="task-label">${task}</span>
        </label>`;
      }).join("");

      return `<div class="track ${track.color}">
        <div class="track-block">
          <div class="track-title">
            <div class="track-dot"></div>
            <span class="track-name">${track.name}</span>
            <span class="track-pct" id="tpct-${track.id}">${tPct}%</span>
          </div>
          <div class="progress-bar" style="margin-bottom:10px">
            <div class="progress-fill" id="tbar-${track.id}" style="width:${tPct}%"></div>
          </div>
          ${tasksHTML}
        </div>
      </div>`;
    }).join("");

    phaseEl.innerHTML = `
      ${phase.frozen ? '<span class="frozen-badge">SCOPE FROZEN</span>' : ''}
      <div class="phase-header">
        <span class="phase-title">${phase.title}</span>
        <span class="phase-time">${phase.time}</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="pbar-${phase.id}" style="width:${phPct}%"
          style="background: linear-gradient(90deg,#f97316,#a855f7)"></div>
      </div>
      <div class="phase-pct-label" id="ppct-${phase.id}">${phPct}%</div>
      <div class="tracks">${tracksHTML}</div>
    `;

    container.appendChild(phaseEl);
  });

  // Single delegated listener
  container.addEventListener("change", async e => {
    if (e.target.type !== "checkbox") return;
    const { phase, track, idx } = e.target.dataset;
    const checked = e.target.checked;
    await save(phase, track, parseInt(idx), checked);
    e.target.closest(".task").classList.toggle("done", checked);
    updateTrack(phase, track);
    updatePhase(phase);
    updateGlobal();
  });

  updateGlobal();
}

function applyRemoteChange(taskKey, done) {
  state[taskKey] = done;
  // find which phase/track/idx owns this key and update the DOM
  const parts = taskKey.replace("hack_", "").split("_");
  // key format: hack_f1_f1p1_0 → parts = ["f1","f1p1","0"]
  const phaseId = parts[0];
  const trackId = parts[0] + parts[1]; // wrong, need to re-parse properly
  // reparse: hack_{phaseId}_{trackId}_{idx}
  const match = taskKey.match(/^hack_(f\d+)_(f\d+p\d+)_(\d+)$/);
  if (!match) return;
  const [, p, t, i] = match;
  const checkbox = document.querySelector(`input[data-phase="${p}"][data-track="${t}"][data-idx="${i}"]`);
  if (checkbox) {
    checkbox.checked = done;
    checkbox.closest(".task").classList.toggle("done", done);
  }
  updateTrack(p, t);
  updatePhase(p);
  updateGlobal();
}

async function init() {
  await loadAllFromDB();
  render();

  // Realtime: sync changes from other browsers
  sb.channel("hackathon_tasks")
    .on("postgres_changes", { event: "*", schema: "public", table: "hackathon_tasks" }, payload => {
      const { task_key, done } = payload.new;
      applyRemoteChange(task_key, done);
    })
    .subscribe();
}

init();
</script>
</body>
</html>
